services:
  # The Database
  db:
    image: postgres:15-alpine
    container_name: maritime_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-maritime_intel}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-maritime_intel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The FastAPI Backend (also handles pipeline execution via API endpoints)
  api:
    build: .
    container_name: maritime_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-maritime_intel}
      - HF_HOME=/cache/huggingface
    volumes:
      - huggingface_cache:/cache/huggingface
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  # The Next.js Frontend (replaces old Streamlit dashboard)
  frontend:
    build: ./frontend
    container_name: maritime_frontend
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000


volumes:
  postgres_data:
  # Shared model cache — models download once on first run, reused by all services
  huggingface_cache:

